<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mapa interactivo - Cabrera (Marcadores personalizados)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

/* ================= POPUP ================= */
.popup {
    display: inline-block;
    text-align: center;
    font-family: Arial;
    padding: 12px;
}

.popup img {
    width: 85vw;
    max-width: 950px;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 14px;
    display: block;
    margin: 0 auto;
}

.popup h4 {
    margin: 6px 0;
    font-size: 18px;
}

.popup p {
    margin: 6px 0;
    font-size: 14px;
}

button {
    margin: 6px;
    padding: 6px 12px;
    cursor: pointer;
}

/* ================= LEAFLET FIX ================= */
.leaflet-popup-content-wrapper {
    padding: 0 !important;
    border-radius: 14px;
}

.leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
}

.leaflet-popup {
    max-width: none !important;
}

/* Estilo para el control de capas */
.leaflet-control-layers {
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

.leaflet-control-layers label {
    font-family: Arial, sans-serif;
    font-size: 14px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAPA BASE (SATELITAL POR DEFECTO) =================
var map = L.map('map').setView([3.9863, -74.4834], 13);

// Capa satelital (Esri World Imagery)
var sateliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri',
    maxZoom: 19
}).addTo(map);

// Capa callejera (OpenStreetMap)
var callejeroLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
});

// Capa de relieve (OpenTopoMap)
var relieveLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data: &copy; OpenStreetMap, SRTM | Map style: &copy; OpenTopoMap'
});

// ================= CENTRADO DEL POPUP =================
map.on('popupopen', function(e) {
    setTimeout(() => {
        map.panTo(e.popup.getLatLng(), { animate: true });
    }, 120);
});

// ================= CARRUSEL =================
function crearPopup(imagenes, id, titulo) {

    let html = `
    <div class="popup">
        <h4>${titulo}</h4>

        <img id="img_${id}" src="${imagenes[0].ruta}">
        <p id="desc_${id}">${imagenes[0].desc}</p>

        <button onclick="prev('${id}')">◀</button>
        <button onclick="next('${id}')">▶</button>

        <p id="count_${id}">1 / ${imagenes.length}</p>
    </div>
    `;

    window[`imgs_${id}`] = imagenes;
    window[`i_${id}`] = 0;

    return html;
}

// ================= UPDATE =================
function update(id) {
    let i = window[`i_${id}`];
    let imgs = window[`imgs_${id}`];

    document.getElementById(`img_${id}`).src = imgs[i].ruta;
    document.getElementById(`desc_${id}`).innerText = imgs[i].desc;
    document.getElementById(`count_${id}`).innerText = (i+1) + " / " + imgs.length;
}

// ================= NEXT / PREV =================
function next(id) {
    window[`i_${id}`] = (window[`i_${id}`] + 1) % window[`imgs_${id}`].length;
    update(id);
}

function prev(id) {
    window[`i_${id}`] = (window[`i_${id}`] - 1 + window[`imgs_${id}`].length) % window[`imgs_${id}`].length;
    update(id);
}

// ================= BASE IMÁGENES =================
const base = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/documentos_interactivos/";

// ================= CREAR MARCADORES PERSONALIZADOS =================
// Función para crear iconos personalizados
function crearIcono(color, nombre) {
    return L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color: ${color}; 
                          width: 32px; 
                          height: 32px; 
                          border-radius: 50%; 
                          display: flex; 
                          align-items: center; 
                          justify-content: center;
                          border: 3px solid white;
                          box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                          font-weight: bold;
                          color: white;
                          font-size: 16px;
                          font-family: Arial;">
                    ${nombre}
                </div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -16]
    });
}

// Crear diferentes iconos para cada punto
var iconoPunto1 = crearIcono('#2b8cbe', '★');  // Azul con estrella
var iconoPunto2 = crearIcono('#31a354', '🌲');  // Verde con árbol
var iconoPunto3 = crearIcono('#e6550d', '🌸');  // Naranja con flor

// Opcional: Versión con números en lugar de emojis
// var iconoPunto1 = crearIcono('#2b8cbe', '1');
// var iconoPunto2 = crearIcono('#31a354', '2');
// var iconoPunto3 = crearIcono('#e6550d', '3');

// ================= PUNTO 1 (Centro - Azul) =================
var imgs_p1 = [
    {ruta: base + "cab.jpg", desc: "Parque central"},
    {ruta: base + "monta4.jpg", desc: "Pueblo"},
    {ruta: base + "pana.jpg", desc: "Escuela"}
];

L.marker([3.9863, -74.4834], { icon: iconoPunto1 })
.addTo(map)
.bindPopup(crearPopup(imgs_p1, "p1", "🏙️ Punto 1 - Centro"));

// ================= PUNTO 2 (Zona Rural - Verde) =================
var imgs_p2 = [
    {ruta: base + "monta1.jpg", desc: "Perrito"},
    {ruta: base + "monta2.jpg", desc: "Paisaje"},
    {ruta: base + "monta3.jpg", desc: "Insecto"},
    {ruta: base + "monta4.jpg", desc: "Pueblo"},
    {ruta: base + "monta5.jpg", desc: "Vereda"},
    {ruta: base + "monta6.jpg", desc: "Río"}
];

L.marker([3.9840, -74.4884], { icon: iconoPunto2 })
.addTo(map)
.bindPopup(crearPopup(imgs_p2, "p2", "🌳 Punto 2 - Zona Rural"));

// ================= PUNTO 3 (Naturaleza - Naranja) =================
var imgs_p3 = [
    {ruta: base + "flor1.jpg", desc: "Flor"},
    {ruta: base + "flor2.jpg", desc: "Orquídea"}
];

L.marker([3.9708, -74.4736], { icon: iconoPunto3 })
.addTo(map)
.bindPopup(crearPopup(imgs_p3, "p3", "🌸 Punto 3 - Naturaleza"));

// ================= CONTROL DE CAPAS BASE =================
var baseMaps = {
    "🛰️ Satélite (Esri)": sateliteLayer,
    "🗺️ Callejero (OSM)": callejeroLayer,
    "⛰️ Relieve (TopoMap)": relieveLayer
};

var overlayMaps = {};

// ================= GEOJSON (CAPAS VECTORIALES) =================
const vectorBase = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/vectorial/";

// --- LÍMITE DE CABRERA ---
fetch(vectorBase + "cabrera_cundinamarca.geojson")
.then(res => res.json())
.then(data => {
    var capaCabrera = L.geoJSON(data, {
        style: {
            color: "#2b8cbe",
            weight: 2,
            fillOpacity: 0.25
        }
    }).addTo(map);
    
    overlayMaps["📍 Límite de Cabrera"] = capaCabrera;
    agregarControlCapas();
})
.catch(err => console.log("Error cargando cabrera.geojson", err));

// --- RESERVA CAMPESINA ---
fetch(vectorBase + "reserva_campesina_cabrera.geojson")
.then(res => res.json())
.then(data => {
    var capaReserva = L.geoJSON(data, {
        style: {
            color: "#31a354",
            weight: 2,
            fillOpacity: 0.25
        }
    }).addTo(map);
    
    overlayMaps["🌾 Reserva Campesina"] = capaReserva;
    agregarControlCapas();
})
.catch(err => console.log("Error cargando reserva_campesina.geojson", err));

// Función para añadir el control de capas
var controlAgregado = false;
function agregarControlCapas() {
    if (!controlAgregado && Object.keys(overlayMaps).length === 2) {
        L.control.layers(baseMaps, overlayMaps, {
            collapsed: false,
            position: 'topright'
        }).addTo(map);
        controlAgregado = true;
    }
}

console.log("✅ Mapa cargado - Marcadores personalizados activos");

</script>

</body>
</html>
