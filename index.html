<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mapa interactivo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

/* ================= POPUP ================= */
.popup {
    display: inline-block;
    text-align: center;
    font-family: Arial;
    padding: 12px;
}

/* 🔥 IMAGEN GRANDE */
.popup img {
    width: 85vw;
    max-width: 950px;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 14px;
    display: block;
    margin: 0 auto;
}

.popup h4 {
    margin: 6px 0;
}

.popup p {
    margin: 6px 0;
    font-size: 14px;
}

button {
    margin: 6px;
    padding: 6px 12px;
    cursor: pointer;
}

/* ================= LEAFLET FIX ================= */
.leaflet-popup-content-wrapper {
    padding: 0 !important;
    border-radius: 14px;
}

.leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
}

.leaflet-popup {
    max-width: none !important;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAPA =================
var map = L.map('map').setView([3.9863, -74.4834], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ================= CENTRADO =================
map.on('popupopen', function(e) {
    setTimeout(() => {
        map.panTo(e.popup.getLatLng(), { animate: true });
    }, 120);
});

// ================= CARRUSEL =================
function crearPopup(imagenes, id, titulo) {

    let html = `
    <div class="popup">
        <h4>${titulo}</h4>

        <img id="img_${id}" src="${imagenes[0].ruta}">
        <p id="desc_${id}">${imagenes[0].desc}</p>

        <button onclick="prev('${id}')">◀</button>
        <button onclick="next('${id}')">▶</button>

        <p id="count_${id}">1 / ${imagenes.length}</p>
    </div>
    `;

    window[`imgs_${id}`] = imagenes;
    window[`i_${id}`] = 0;

    return html;
}

// ================= UPDATE =================
function update(id) {
    let i = window[`i_${id}`];
    let imgs = window[`imgs_${id}`];

    document.getElementById(`img_${id}`).src = imgs[i].ruta;
    document.getElementById(`desc_${id}`).innerText = imgs[i].desc;
    document.getElementById(`count_${id}`).innerText = (i+1) + " / " + imgs.length;

    setTimeout(() => {
        let popup = document.querySelector(".leaflet-popup");
        if (popup) {
            popup.style.display = "none";
            popup.offsetHeight;
            popup.style.display = "";
            map.invalidateSize();
        }
    }, 50);
}

// ================= NEXT / PREV =================
function next(id) {
    window[`i_${id}`] = (window[`i_${id}`] + 1) % window[`imgs_${id}`].length;
    update(id);
}

function prev(id) {
    window[`i_${id}`] = (window[`i_${id}`] - 1 + window[`imgs_${id}`].length) % window[`imgs_${id}`].length;
    update(id);
}

// ================= GITHUB BASE =================
const base = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/documentos_interactivos/";

// ================= PUNTOS =================
var imgs_p1 = [
    {ruta: base + "cab.jpg", desc: "Parque central"},
    {ruta: base + "monta4.jpg", desc: "Pueblo"},
    {ruta: base + "pana.jpg", desc: "Escuela"}
];

L.marker([3.9863, -74.4834])
.addTo(map)
.bindPopup(crearPopup(imgs_p1, "p1", "Punto 1"));

// ---------------- PUNTO 2 ----------------
var imgs_p2 = [
    {ruta: base + "monta1.jpg", desc: "Perrito"},
    {ruta: base + "monta2.jpg", desc: "Paisaje"},
    {ruta: base + "monta3.jpg", desc: "Insecto"},
    {ruta: base + "monta4.jpg", desc: "Pueblo"},
    {ruta: base + "monta5.jpg", desc: "Vereda"},
    {ruta: base + "monta6.jpg", desc: "Río"}
];

L.marker([3.9840, -74.4884])
.addTo(map)
.bindPopup(crearPopup(imgs_p2, "p2", "Punto 2"));

// ---------------- PUNTO 3 ----------------
var imgs_p3 = [
    {ruta: base + "flor1.jpg", desc: "Flor"},
    {ruta: base + "flor2.jpg", desc: "Orquídea"}
];

L.marker([3.9708, -74.4736])
.addTo(map)
.bindPopup(crearPopup(imgs_p3, "p3", "Punto 3"));

// ================= 🔥 GEOJSON CAPAS =================

// URL base vectorial
const vectorBase = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/vectorial/";

// --- CABRERA GEOJSON ---
fetch(vectorBase + "cabrera.geojson")
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {
        style: {
            color: "#2b8cbe",
            weight: 2,
            fillOpacity: 0.2
        },
        onEachFeature: function (feature, layer) {
            if (feature.properties && feature.properties.name) {
                layer.bindPopup("<b>" + feature.properties.name + "</b>");
            }
        }
    }).addTo(map);

});

// --- RESERVA CAMPESINA ---
fetch(vectorBase + "reserva_campesina.geojson")
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {
        style: {
            color: "#31a354",
            weight: 2,
            fillOpacity: 0.25
        },
        onEachFeature: function (feature, layer) {
            if (feature.properties && feature.properties.name) {
                layer.bindPopup("<b>" + feature.properties.name + "</b>");
            }
        }
    }).addTo(map);

});

</script>

</body>
</html>
