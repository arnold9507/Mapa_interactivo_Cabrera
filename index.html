<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mapa interactivo - Cabrera</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

/* ================= POPUP ================= */
.popup {
    display: inline-block;
    text-align: center;
    font-family: Arial;
    padding: 12px;
}

.popup img {
    width: 85vw;
    max-width: 950px;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 14px;
    display: block;
    margin: 0 auto;
}

.popup h4 {
    margin: 6px 0;
    font-size: 18px;
}

.popup p {
    margin: 6px 0;
    font-size: 14px;
}

button {
    margin: 6px;
    padding: 6px 12px;
    cursor: pointer;
}

/* ================= POPUP CENTRADO EN PANTALLA (SIN MOVER MAPA) ================= */
/* Esto fuerza al popup a aparecer centrado en la pantalla */
.leaflet-popup {
    position: fixed !important;
    top: 50% !important;
    left: 50% !important;
    transform: translate(-50%, -50%) !important;
    z-index: 1000 !important;
    margin: 0 !important;
    pointer-events: auto !important;
}

/* Ocultar el popup por defecto (se muestra cuando está abierto) */
.leaflet-popup:not(.leaflet-popup-open) {
    display: none !important;
}

/* Ajustes para el contenido del popup */
.leaflet-popup-content-wrapper {
    padding: 0 !important;
    border-radius: 14px;
    width: auto !important;
    max-width: 90vw !important;
}

.leaflet-popup-content {
    margin: 0 !important;
    width: auto !important;
    min-width: 300px;
}

/* Desactivar la flecha del popup (no la necesitamos) */
.leaflet-popup-tip {
    display: none !important;
}

/* Estilo para el control de capas */
.leaflet-control-layers {
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    z-index: 1100 !important;
}

.leaflet-control-layers label {
    font-family: Arial, sans-serif;
    font-size: 14px;
}

/* Fondo semi-transparente cuando el popup está abierto */
.popup-backdrop {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 999;
    display: none;
}

.popup-backdrop.active {
    display: block;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="popup-backdrop" class="popup-backdrop"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAPA BASE (SATELITAL POR DEFECTO) =================
var map = L.map('map').setView([3.9863, -74.4834], 13);

// Capa satelital (Esri World Imagery)
var sateliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles &copy; Esri',
    maxZoom: 19
}).addTo(map);

// Capa callejera (OpenStreetMap)
var callejeroLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
});

// Capa de relieve (OpenTopoMap)
var relieveLayer = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: 'Map data: &copy; OpenStreetMap, SRTM | Map style: &copy; OpenTopoMap'
});

// ================= CENTRAR POPUP SIN MOVER MAPA =================
// Esta función fuerza el popup a centrarse sin mover el mapa
function centrarPopupEnPantalla(popupElement) {
    if (popupElement) {
        // Añadir clase para mostrar el popup centrado
        popupElement.classList.add('leaflet-popup-open');
        
        // Mostrar fondo oscuro
        document.getElementById('popup-backdrop').classList.add('active');
        
        // Cerrar popup al hacer clic en el fondo
        document.getElementById('popup-backdrop').onclick = function() {
            map.closePopup();
        };
    }
}

// Detectar cuando se abre un popup
map.on('popupopen', function(e) {
    // Esperar a que el DOM se actualice
    setTimeout(function() {
        var popupElement = document.querySelector('.leaflet-popup');
        if (popupElement) {
            centrarPopupEnPantalla(popupElement);
        }
    }, 10);
});

// Detectar cuando se cierra un popup
map.on('popupclose', function() {
    var popupElement = document.querySelector('.leaflet-popup');
    if (popupElement) {
        popupElement.classList.remove('leaflet-popup-open');
    }
    document.getElementById('popup-backdrop').classList.remove('active');
});

// ================= CARRUSEL =================
function crearPopup(imagenes, id, titulo) {

    let html = `
    <div class="popup">
        <button onclick="cerrarPopup()" style="position: absolute; top: 5px; right: 10px; background: none; border: none; font-size: 20px; cursor: pointer;">✕</button>
        <h4>${titulo}</h4>

        <img id="img_${id}" src="${imagenes[0].ruta}">
        <p id="desc_${id}">${imagenes[0].desc}</p>

        <button onclick="prev('${id}')">◀</button>
        <button onclick="next('${id}')">▶</button>

        <p id="count_${id}">1 / ${imagenes.length}</p>
    </div>
    `;

    window[`imgs_${id}`] = imagenes;
    window[`i_${id}`] = 0;

    return html;
}

// Función para cerrar el popup
function cerrarPopup() {
    map.closePopup();
}

// ================= UPDATE =================
function update(id) {
    let i = window[`i_${id}`];
    let imgs = window[`imgs_${id}`];

    document.getElementById(`img_${id}`).src = imgs[i].ruta;
    document.getElementById(`desc_${id}`).innerText = imgs[i].desc;
    document.getElementById(`count_${id}`).innerText = (i+1) + " / " + imgs.length;
}

// ================= NEXT / PREV =================
function next(id) {
    window[`i_${id}`] = (window[`i_${id}`] + 1) % window[`imgs_${id}`].length;
    update(id);
}

function prev(id) {
    window[`i_${id}`] = (window[`i_${id}`] - 1 + window[`imgs_${id}`].length) % window[`imgs_${id}`].length;
    update(id);
}

// ================= BASE IMÁGENES =================
const base = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/documentos_interactivos/";

// ================= CREAR MARCADORES PERSONALIZADOS =================
function crearIcono(color, nombre) {
    return L.divIcon({
        className: 'custom-div-icon',
        html: `<div style="background-color: ${color}; 
                          width: 32px; 
                          height: 32px; 
                          border-radius: 50%; 
                          display: flex; 
                          align-items: center; 
                          justify-content: center;
                          border: 3px solid white;
                          box-shadow: 0 2px 5px rgba(0,0,0,0.3);
                          font-weight: bold;
                          color: white;
                          font-size: 16px;
                          font-family: Arial;">
                    ${nombre}
                </div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 32],
        popupAnchor: [0, -16]
    });
}

var iconoPunto1 = crearIcono('#2b8cbe', '★');
var iconoPunto2 = crearIcono('#31a354', '🌲');
var iconoPunto3 = crearIcono('#e6550d', '🌸');

// ================= PUNTO 1 =================
var imgs_p1 = [
    {ruta: base + "cab.jpg", desc: "Parque central"},
    {ruta: base + "monta4.jpg", desc: "Pueblo"},
    {ruta: base + "pana.jpg", desc: "Escuela"}
];

L.marker([3.9863, -74.4834], { icon: iconoPunto1 })
.addTo(map)
.bindPopup(crearPopup(imgs_p1, "p1", "🏙️ Punto 1 - Centro"));

// ================= PUNTO 2 =================
var imgs_p2 = [
    {ruta: base + "monta1.jpg", desc: "Perrito"},
    {ruta: base + "monta2.jpg", desc: "Paisaje"},
    {ruta: base + "monta3.jpg", desc: "Insecto"},
    {ruta: base + "monta4.jpg", desc: "Pueblo"},
    {ruta: base + "monta5.jpg", desc: "Vereda"},
    {ruta: base + "monta6.jpg", desc: "Río"}
];

L.marker([3.9840, -74.4884], { icon: iconoPunto2 })
.addTo(map)
.bindPopup(crearPopup(imgs_p2, "p2", "🌳 Punto 2 - Zona Rural"));

// ================= PUNTO 3 =================
var imgs_p3 = [
    {ruta: base + "flor1.jpg", desc: "Flor"},
    {ruta: base + "flor2.jpg", desc: "Orquídea"}
];

L.marker([3.9708, -74.4736], { icon: iconoPunto3 })
.addTo(map)
.bindPopup(crearPopup(imgs_p3, "p3", "🌸 Punto 3 - Naturaleza"));

// ================= CONTROL DE CAPAS =================
var baseMaps = {
    "🛰️ Satélite (Esri)": sateliteLayer,
    "🗺️ Callejero (OSM)": callejeroLayer,
    "⛰️ Relieve (TopoMap)": relieveLayer
};

var overlayMaps = {};

// ================= GEOJSON =================
const vectorBase = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/vectorial/";

fetch(vectorBase + "cabrera_cundinamarca.geojson")
.then(res => res.json())
.then(data => {
    var capaCabrera = L.geoJSON(data, {
        style: { color: "#2b8cbe", weight: 2, fillOpacity: 0.25 }
    }).addTo(map);
    overlayMaps["📍 Límite de Cabrera"] = capaCabrera;
    agregarControlCapas();
})
.catch(err => console.log("Error", err));

fetch(vectorBase + "reserva_campesina_cabrera.geojson")
.then(res => res.json())
.then(data => {
    var capaReserva = L.geoJSON(data, {
        style: { color: "#31a354", weight: 2, fillOpacity: 0.25 }
    }).addTo(map);
    overlayMaps["🌾 Reserva Campesina"] = capaReserva;
    agregarControlCapas();
})
.catch(err => console.log("Error", err));

var controlAgregado = false;
function agregarControlCapas() {
    if (!controlAgregado && Object.keys(overlayMaps).length === 2) {
        L.control.layers(baseMaps, overlayMaps, {
            collapsed: false,
            position: 'topright'
        }).addTo(map);
        controlAgregado = true;
    }
}

console.log("✅ Mapa listo - El mapa NO se mueve, el popup aparece centrado");

</script>

</body>
</html>
