<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Mapa interactivo</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
#map { height: 100vh; }

/* ================= POPUP ================= */
.popup {
    display: inline-block;
    text-align: center;
    font-family: Arial;
    padding: 12px;
}

.popup img {
    width: 85vw;
    max-width: 950px;
    max-height: 75vh;
    object-fit: contain;
    border-radius: 14px;
    display: block;
    margin: 0 auto;
}

button {
    margin: 6px;
    padding: 6px 12px;
    cursor: pointer;
}

/* ================= LEYENDA ================= */
.legend {
    background: white;
    padding: 10px 12px;
    font-family: Arial;
    font-size: 14px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.2);
    line-height: 22px;
}

.legend i {
    width: 18px;
    height: 18px;
    float: left;
    margin-right: 8px;
    opacity: 0.8;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

// ================= MAPA =================
var map = L.map('map').setView([3.9863, -74.4834], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ================= LEYENDA =================
var legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {

    var div = L.DomUtil.create('div', 'legend');

    div.innerHTML += "<b>Leyenda</b><br><br>";

    div.innerHTML +=
        '<i style="background:#2b8cbe"></i> Cabrera<br>';

    div.innerHTML +=
        '<i style="background:#31a354"></i> Reserva Campesina<br>';

    return div;
};

legend.addTo(map);

// ================= GITHUB VECTOR =================
const vectorBase = "https://arnold9507.github.io/Mapa_interactivo_Cabrera/vectorial/";

// ================= CABRERA =================
fetch(vectorBase + "cabrera.geojson")
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {
        style: {
            color: "#2b8cbe",
            weight: 2,
            fillOpacity: 0.25
        }
    }).addTo(map);

});

// ================= RESERVA CAMPESINA =================
fetch(vectorBase + "reserva_campesina_cabrera.geojson")
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {
        style: {
            color: "#31a354",
            weight: 2,
            fillOpacity: 0.25
        }
    }).addTo(map);

});

</script>

</body>
</html>
